<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">

<title>Đăng nhập hệ thống</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#6366f1;
--secondary:#22d3ee;
--bg:#020617;
--text:#e5e7eb;
--muted:#94a3b8;
}

body{
margin:0;
height:100vh;
font-family:Inter,sans-serif;
background:radial-gradient(circle at top,#1e293b,var(--bg));
display:flex;
align-items:center;
justify-content:center;
color:var(--text);
overflow:hidden;
}

.glow{
position:absolute;
width:450px;
height:450px;
background:radial-gradient(circle,rgba(99,102,241,.4),transparent 70%);
filter:blur(70px);
top:-120px;
left:-120px;
}

.glow.r{
background:radial-gradient(circle,rgba(34,211,238,.35),transparent 70%);
top:auto;
left:auto;
bottom:-120px;
right:-120px;
}

.card{
width:380px;
padding:42px 36px;
border-radius:28px;
background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(16px);
box-shadow:0 30px 80px rgba(0,0,0,.55);
text-align:center;
z-index:2;
}

.logo{
width:64px;
height:64px;
margin:0 auto 16px;
border-radius:18px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:26px;
box-shadow:0 12px 30px rgba(99,102,241,.5);
}

h1{
margin:6px 0;
font-size:26px;
}

p{
margin:0 0 28px;
color:var(--muted);
font-size:14px;
}

#error-message{
display:none;
background:rgba(239,68,68,.2);
border:1px solid #ef4444;
color:#ef4444;
padding:12px;
border-radius:8px;
margin-bottom:15px;
font-size:14px;
}

#loading{
display:none;
text-align:center;
padding:20px;
}

#google-signin{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:12px;
min-height:50px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="glow"></div>
<div class="glow r"></div>

<div class="card">

<div class="logo">PVV</div>

<h1>Đăng nhập hệ thống</h1>

<p>Sử dụng tài khoản Google được cấp quyền</p>

<div id="error-message"></div>

<div id="loading">

<div style="width:20px;height:20px;border:3px solid var(--text);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px;"></div>

<p>Đang xác nhận...</p>

</div>

<div id="google-signin"></div>

</div>

<script>

var CLIENT_ID = "342595955640-k6qg5h3q60n04jr9t1h546ob28q9s094.apps.googleusercontent.com";

var ADMIN = "phanvo0001@gmail.com";

window.handleCredentialResponse = function(res){

document.getElementById('loading').style.display="block";
document.getElementById('google-signin').style.display="none";

try{

var base64Url=res.credential.split('.')[1];
var base64=base64Url.replace(/-/g,'+').replace(/_/g,'/');
var payload=JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){
return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
}).join('')));

var email=payload.email.toLowerCase();

if(email===ADMIN){

saveAndRedirect(payload);
return;

}

checkFirebase(email,payload);

}catch(e){

showError("Lỗi xác thực");
resetUI();

}

}

function checkFirebase(email,payload){

if(!window.__db){

showError("Firebase chưa sẵn sàng");
resetUI();
return;

}

var fns=window.__firebaseFns;

fns.get(fns.ref(window.__db,'nhansu')).then(function(snap){

var ok=false;

if(snap.exists()){

var data=snap.val();

for(var key in data){

if(data[key].email && data[key].email.toLowerCase()===email){

ok=true;
break;

}

}

}

if(ok){

saveAndRedirect(payload);

}else{

showError("Email không có quyền truy cập");
resetUI();

}

});

}

function saveAndRedirect(p){

localStorage.setItem("user_name",p.name);
localStorage.setItem("user_email",p.email);
localStorage.setItem("user_picture",p.picture||"");

setTimeout(function(){

location.href="home.html";

},500);

}

function showError(msg){

var el=document.getElementById("error-message");

el.textContent=msg;
el.style.display="block";

}

function resetUI(){

document.getElementById('loading').style.display="none";
document.getElementById('google-signin').style.display="flex";

}

</script>


<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {getDatabase,ref,get} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app=initializeApp({

apiKey:"AIzaSyDYd5jO14_dVM_VTG0-P0m4uCzYRBqheYg",
authDomain:"iot1-5dea0.firebaseapp.com",
databaseURL:"https://iot1-5dea0-default-rtdb.firebaseio.com",
projectId:"iot1-5dea0",
storageBucket:"iot1-5dea0.firebasestorage.app",
messagingSenderId:"1092996136822",
appId:"1:1092996136822:web:127ffa014f0be36225c457"

});

window.__db=getDatabase(app);

window.__firebaseFns={ref,get};

</script>


<script>

var gsiScript=document.createElement("script");

gsiScript.src="https://accounts.google.com/gsi/client";

gsiScript.async=true;

gsiScript.defer=true;

gsiScript.onload=function(){

google.accounts.id.initialize({

client_id:CLIENT_ID,
callback:window.handleCredentialResponse,
ux_mode:"popup"

});

google.accounts.id.renderButton(

document.getElementById("google-signin"),

{
type:"standard",
theme:"filled_blue",
size:"large",
shape:"pill",
width:280
}

);

};

document.head.appendChild(gsiScript);

</script>

</body>
</html>
